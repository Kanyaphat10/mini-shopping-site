services:
  db:
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mini-shop
      PGDATA: /data/postgres
    volumes:
      - minishop:/data/postgres
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  minishop: